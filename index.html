<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peemens Guesthouse</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo {
  font-family: 'Playfair Display';
  font-size: 40px;
  color: gold;
  animation: intro 2.5s ease forwards;
}

@keyframes intro {
  0% { transform: rotateX(90deg); opacity: 0; }
  100% { transform: rotateX(0); opacity: 1; }
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 3D CANVAS */
#threeCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* HERO CONTENT */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.content h1 {
  font-family: 'Playfair Display';
  font-size: 50px;
}

.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: gold;
  color: black;
  text-decoration: none;
  border-radius: 30px;
  display: inline-block;
}

/* FADE */
.fade-in {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* ROOMS */
.rooms {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* PARALLAX */
.parallax {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945') center/cover fixed;
}

/* BOOKING */
.form-box {
  max-width: 500px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 15px;
  background: gold;
  border: none;
  font-weight: bold;
}

footer {
  background: black;
  padding: 20px;
  text-align: center;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1 class="logo">Peemens Guesthouse</h1>
</div>

<!-- HERO -->
<div class="hero">

  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-luxury-hotel-2603/1080p.mp4">
  </video>

  <!-- 3D CANVAS -->
  <canvas id="threeCanvas"></canvas>

  <div class="overlay"></div>

  <div class="content">
    <h1>Peemens Guesthouse</h1>
    <p>Luxury Experience</p>
    <a href="#booking" class="btn">Book Now</a>
  </div>

</div>

<!-- ROOMS -->
<section class="section fade-in">
<h2>Our Rooms</h2>

<div class="rooms">
<div class="card"><img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"><h3>Standard</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461"><h3>Deluxe</h3></div>
<div class="card"><img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2"><h3>Executive</h3></div>
</div>
</section>

<!-- PARALLAX -->
<div class="parallax"></div>

<!-- BOOKING -->
<section id="booking" class="section fade-in">

<h2>Book Your Stay</h2>

<div class="form-box">

<input id="name" placeholder="Full Name">

<select id="room">
<option value="100">Standard - GHS 100</option>
<option value="180">Deluxe - GHS 180</option>
<option value="250">Executive - GHS 250</option>
</select>

<input type="date" id="checkin">
<input type="date" id="checkout">

<button onclick="bookNow()">Confirm Booking</button>

</div>

</section>

<footer>
© 2026 Peemens Guesthouse
</footer>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* LOADER */
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 2500);
};

/* SCROLL */
const elements = document.querySelectorAll(".fade-in");

window.addEventListener("scroll", () => {
  elements.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight - 100) {
      el.classList.add("show");
    }
  });
});

/* BOOKING */
function bookNow() {

  let name = document.getElementById("name").value;
  let room = document.getElementById("room");
  let roomText = room.options[room.selectedIndex].text;
  let price = room.value;

  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value;

  let days = (new Date(checkout) - new Date(checkin)) / (1000*60*60*24);

  if(days <= 0) return alert("Invalid dates");

  let total = days * price;

  let msg = `Booking:
Name: ${name}
Room: ${roomText}
Check-in: ${checkin}
Check-out: ${checkout}
Total: GHS ${total}`;

  window.open(`https://wa.me/233264594779?text=${encodeURIComponent(msg)}`);
}

/* 3D SCENE */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("threeCanvas"),
  alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.IcosahedronGeometry(2, 1);

const material = new THREE.MeshStandardMaterial({
  color: 0xFFD700,
  metalness: 1,
  roughness: 0.2
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

camera.position.z = 5;

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX/window.innerWidth)*2-1;
  mouseY = -(e.clientY/window.innerHeight)*2+1;
});

function animate() {
  requestAnimationFrame(animate);

  mesh.rotation.x += 0.005;
  mesh.rotation.y += 0.01;

  mesh.position.x = mouseX * 1.5;
  mesh.position.y = mouseY * 1.5;

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

</script>

</body>
</html>
