<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Treehouse Restaurant</title>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#0d0d0d;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.7);
    z-index:1000;
}
nav h1{color:#d4af37;}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    overflow:hidden;
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h2{font-size:50px;}
.hero button{
    padding:12px 20px;
    margin-top:20px;
    background:#d4af37;
    border:none;
    cursor:pointer;
}

/* 3D SCENE */
#scene{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;
    z-index:0;
}

/* BOOKING */
section{
    padding:80px 40px;
}

.form-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

input,select,textarea{
    padding:12px;
    border:none;
    border-radius:5px;
}

.btn{
    background:#d4af37;
    padding:12px;
    border:none;
    cursor:pointer;
}

/* CONTACT */
.contact-btns{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.call{background:#28a745;}
.wa{background:#25D366;}

/* MAP */
iframe{
    width:100%;
    height:250px;
    border-radius:10px;
}

/* ADMIN */
.admin{
    background:#111;
    padding:20px;
    margin-top:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #333;
    padding:10px;
}

th{background:#222;}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h1>Treehouse</h1>
</nav>

<!-- HERO -->
<div class="hero">

<div id="scene"></div>

<div class="hero-content">
<h2>Luxury Dining in Accra</h2>
<p>Book your table instantly</p>
<button onclick="document.getElementById('book').scrollIntoView()">Reserve</button>
</div>

</div>

<!-- BOOKING -->
<section id="book">

<h2>Book a Table</h2>

<div class="form-box">

<form id="bookingForm">

<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>

<select id="guests">
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
<option>5+ Guests</option>
</select>

<select id="time">
<option>12:00 PM</option>
<option>2:00 PM</option>
<option>4:00 PM</option>
<option>6:00 PM</option>
<option>8:00 PM</option>
</select>

<textarea id="message" placeholder="Message"></textarea>

<button class="btn" type="submit">Confirm Booking</button>

</form>

<!-- CONTACT -->
<div>

<h3>Contact</h3>
<p>📍 Nyaniba, Accra</p>
<p>📞 +233 59 940 0737</p>

<div class="contact-btns">
<a class="btn call" href="tel:+233599400737">Call</a>
<a class="btn wa" id="waBtn">WhatsApp</a>
</div>

<iframe src="https://www.google.com/maps?q=5.5608835,-0.1721958&output=embed"></iframe>

</div>

</div>

<!-- ADMIN -->
<div class="admin">
<h3>Admin Dashboard</h3>
<input type="password" id="pin" placeholder="Enter PIN">
<button onclick="login()">Login</button>

<table id="table" style="display:none;">
<tr>
<th>Name</th>
<th>Email</th>
<th>Guests</th>
<th>Time</th>
<th>Delete</th>
</tr>
</table>

</div>

</section>

<script>

/* WHATSAPP */
document.getElementById("waBtn").onclick = function(){
    let msg = `Hello, I want to book a table`;
    window.open("https://wa.me/233599400737?text=" + msg);
};

/* BOOKING */
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

let booking = {
name: name.value,
email: email.value,
guests: guests.value,
time: time.value,
message: message.value
};

let data = JSON.parse(localStorage.getItem("bookings")) || [];
data.push(booking);
localStorage.setItem("bookings", JSON.stringify(data));

alert("Booking Saved!");
});

/* ADMIN LOGIN */
function login(){
if(pin.value === "1234"){
document.getElementById("table").style.display="table";
load();
}
}

/* LOAD BOOKINGS */
function load(){
let data = JSON.parse(localStorage.getItem("bookings")) || [];
let table = document.getElementById("table");

data.forEach((b,i)=>{
table.innerHTML += `
<tr>
<td>${b.name}</td>
<td>${b.email}</td>
<td>${b.guests}</td>
<td>${b.time}</td>
<td><button class="delete" onclick="del(${i})">X</button></td>
</tr>`;
});
}

/* DELETE */
function del(i){
let data = JSON.parse(localStorage.getItem("bookings"));
data.splice(i,1);
localStorage.setItem("bookings", JSON.stringify(data));
location.reload();
}

/* 3D MOBIUS */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("scene").appendChild(renderer.domElement);

const geometry = new THREE.ParametricGeometry(function(u,t,target){
u = u*Math.PI*2;
t = (t-0.5)*2;

let a=2;
let x=(a+t*Math.cos(u/2))*Math.cos(u);
let y=(a+t*Math.cos(u/2))*Math.sin(u);
let z=t*Math.sin(u/2);

target.set(x,y,z);
},100,16);

const material = new THREE.MeshStandardMaterial({
color:0xd4af37,
wireframe:true
});

const mobius = new THREE.Mesh(geometry,material);
scene.add(mobius);

camera.position.z=6;

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

function animate(){
requestAnimationFrame(animate);
mobius.rotation.x+=0.005;
mobius.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
