<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stepmens Guest House</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Poppins;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* INTRO SCREEN */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeOut 2.5s ease forwards;
}

#intro h1 {
  font-family: Playfair Display;
  color: gold;
  font-size: 40px;
  transform: perspective(600px) rotateX(40deg);
  animation: introAnim 2s ease forwards;
}

@keyframes introAnim {
  0% { transform: scale(0.6) rotateX(90deg); opacity: 0; }
  100% { transform: scale(1) rotateX(0); opacity: 1; }
}

@keyframes fadeOut {
  0%,70% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* HERO (4D LAYER) */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.hero video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.1);
}

/* 3D CANVAS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* OVERLAY DEPTH */
.layer {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
  mix-blend-mode: multiply;
}

/* CONTENT */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
}

.content h1 {
  font-size: 50px;
  font-family: Playfair Display;
}

/* BUTTON */
.btn {
  padding: 15px 30px;
  background: gold;
  color: black;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}

/* SECTIONS (DEPTH SCROLL = “4D FEEL”) */
.section {
  padding: 100px 20px;
  transform: translateZ(0);
  transition: 0.8s;
}

.section[data-scroll] {
  opacity: 0;
  transform: translateY(80px);
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* ROOMS */
.rooms {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.4s;
}

.card:hover {
  transform: scale(1.05) rotateX(5deg);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* PARALLAX */
.parallax {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945') center/cover fixed;
}

/* BOOKING */
.form-box {
  max-width: 500px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 15px;
  background: gold;
  border: none;
  font-weight: bold;
}

footer {
  background: black;
  padding: 20px;
  text-align: center;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>Stepmens Guest House</h1>
</div>

<!-- HERO -->
<div class="hero">

  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-luxury-hotel-2603/1080p.mp4">
  </video>

  <div class="layer"></div>

  <canvas id="c"></canvas>

  <div class="content">
    <h1>Luxury Stay Experience</h1>
    <a href="#book" class="btn">Book Now</a>
  </div>

</div>

<!-- ROOMS -->
<section class="section" data-scroll>
  <h2>Rooms</h2>

  <div class="rooms">
    <div class="card"><img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1578683010236-d716f9a3f461"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2"></div>
  </div>
</section>

<div class="parallax"></div>

<!-- BOOKING -->
<section id="book" class="section" data-scroll>
  <h2>Book Now</h2>

  <div class="form-box">
    <input placeholder="Name">
    <input type="date">
    <input type="date">
    <button>Confirm Booking</button>
  </div>
</section>

<footer>© Stepmens Guest House</footer>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* 4D SCROLL EFFECT */
const sections = document.querySelectorAll("[data-scroll]");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    if(sec.getBoundingClientRect().top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

/* 3D FLOAT OBJECT */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), alpha:true });

renderer.setSize(innerWidth, innerHeight);

const geo = new THREE.IcosahedronGeometry(2,1);
const mat = new THREE.MeshStandardMaterial({ color:0xFFD700, metalness:1, roughness:0.3 });
const mesh = new THREE.Mesh(geo, mat);

scene.add(mesh);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z = 5;

/* MOUSE 4D FEEL */
document.addEventListener("mousemove", (e)=>{
  mesh.position.x = (e.clientX/window.innerWidth-0.5)*2;
  mesh.position.y = -(e.clientY/window.innerHeight-0.5)*2;
});

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.01;
  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
